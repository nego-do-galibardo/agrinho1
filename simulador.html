<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador | Agrinho</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --amarelo-ouro: #FFD700;
            --verde-floresta: #013220;
            --verde-suave: #e8f5e9;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }

        .container {
            padding: 40px 20px;
            max-width: 900px;
            margin: auto;
        }

        .btn-voltar {
            background-color: transparent;
            color: var(--verde-floresta);
            border: 2px solid var(--verde-floresta);
            padding: 8px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .btn-voltar:hover {
            background-color: var(--verde-floresta);
            color: var(--amarelo-ouro);
        }

        .card-principal {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 10px solid var(--amarelo-ouro);
        }

        h1 {
            color: var(--verde-floresta);
            font-family: 'Montserrat', sans-serif;
            margin-top: 0;
        }

        .explicacao {
            background-color: var(--verde-suave);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            border-left: 5px solid var(--verde-floresta);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--verde-floresta);
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .btn-simular {
            background-color: var(--amarelo-ouro);
            color: var(--verde-floresta);
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-simular:hover {
            background-color: var(--verde-floresta);
            color: var(--amarelo-ouro);
            transform: scale(1.02);
        }

        #resultado {
            margin-top: 30px;
            padding: 25px;
            border-radius: 10px;
            background-color: #fffde7;
            border: 2px solid var(--amarelo-ouro);
            display: none;
        }

        .badge {
            background: var(--verde-floresta);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="btn-voltar">← Voltar ao Início</a>

        <div class="card-principal">
            <h1>Simulador de Sementes</h1>
            
            <div class="explicacao">
                <strong>🌱 Planejamento Inteligente:</strong><br>
                Descubra a quantidade ideal de sacos de sementes (60kg) para a sua área. O cálculo considera a média de densidade recomendada para cada cultura.
            </div>

            <div class="form-group">
                <label for="cultura">Qual cultura você deseja plantar?</label>
                <select id="cultura">
                    <option value="Soja">Soja (Média 1.2 saca/ha)</option>
                    <option value="Milho">Milho (Média 1.0 saca/ha)</option>
                    <option value="Trigo">Trigo (Média 2.5 sacas/ha)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="area">Tamanho da área (Hectares):</label>
                <input type="number" id="area" placeholder="Digite o número de hectares">
            </div>

            <button class="btn-simular" onclick="calcularSementes()">Calcular Necessidade</button>

            <div id="resultado"></div>
        </div>
    </div>

    <script>
        function calcularSementes() {
            const area = parseFloat(document.getElementById('area').value);
            const cultura = document.getElementById('cultura').value;
            const resDiv = document.getElementById('resultado');

            if (area > 0) {
                let sacasPorHectare = 0;

                // Definindo as médias de sacas por hectare
                if (cultura === "Soja") sacasPorHectare = 1.2;
                else if (cultura === "Milho") sacasPorHectare = 1.0;
                else if (cultura === "Trigo") sacasPorHectare = 2.5;

                const totalSacas = (area * sacasPorHectare).toFixed(1);

                resDiv.style.display = "block";
                resDiv.innerHTML = `
                    <div class="badge">Resultado da Simulação</div>
                    <h2 style="color: var(--verde-floresta); margin-top:0;">Planejamento Concluído!</h2>
                    <p>Para plantar <strong>${area} hectares</strong> de <strong>${cultura}</strong>, você precisará de aproximadamente:</p>
                    <div style="font-size: 1.5rem; color: #d4a017; font-weight: bold;">
                        📦 ${totalSacas} sacas de sementes
                    </div>
                    <p style="font-size: 0.8rem; color: #666; margin-top: 15px;">
                        *Cálculo baseado em médias técnicas. Consulte sempre um engenheiro agrônomo para ajustes de densidade específicos da sua variedade.
                    </p>
                `;
            } else {
                alert("Por favor, insira um valor válido para a área da plantação.");
            }
        }
    </script>

</body>
</html>
