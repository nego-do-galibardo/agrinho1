<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador | Agrinho</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* (Mantenha seus estilos anteriores, mas adicione/ajuste estes abaixo) */
        :root {
            --amarelo-ouro: #FFD700;
            --verde-floresta: #013220;
        }

        .btn-voltar {
            background-color: transparent;
            color: var(--verde-floresta);
            border: 2px solid var(--verde-floresta);
            padding: 8px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .btn-voltar:hover {
            background-color: var(--verde-floresta);
            color: var(--amarelo-ouro);
        }

        .btn-simular {
            background-color: var(--amarelo-ouro) !important;
            color: var(--verde-floresta) !important;
        }
    </style>
</head>
<body>

    <div style="padding: 20px; max-width: 900px; margin: auto;">
        <a href="index.html" class="btn-voltar">← Voltar ao Início</a>

        <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
            <h1 style="color: var(--verde-floresta); font-family: 'Montserrat';">Simulador de Campo</h1>
            </div>
    </div>

</body>
</html>
