<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Componente Botão Agrinho</title>
    <style>
        /* 1. VARIÁVEIS DE COR (O SEGREDO) */
        :root {
            --fundo: #f4f9f4;
            --texto: #333333;
            --primaria: #2e7d32;
        }

        /* Cores quando a classe .dark-mode estiver no body */
        body.dark-mode {
            --fundo: #121212;
            --texto: #ffffff;
            --primaria: #4caf50;
        }

        /* 2. ESTILO DO CORPO */
        body {
            background-color: var(--fundo);
            color: var(--texto);
            font-family: sans-serif;
            transition: 0.3s; /* Deixa a mudança suave */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* 3. ESTILO DO BOTÃO */
        #theme-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background-color: var(--primaria);
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 9999;
        }

        #theme-button:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h1>Teste do Modo Escuro</h1>
    <p>Se o fundo mudar de cor, o botão está funcionando!</p>

    <button id="theme-button">🌓</button>

    <script>
        // 4. LÓGICA JAVASCRIPT
        const btn = document.getElementById('theme-button');
        
        // Verifica se já tinha algo salvo no navegador
        if (localStorage.getItem('dark-mode') === 'ativo') {
            document.body.classList.add('dark-mode');
        }

        // Função que troca a classe ao clicar
        btn.onclick = function() {
            document.body.classList.toggle('dark-mode');
            
            // Salva a escolha para não resetar ao atualizar a página
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('dark-mode', 'ativo');
            } else {
                localStorage.setItem('dark-mode', 'inativo');
            }
        };
    </script>
</body>
</html>
