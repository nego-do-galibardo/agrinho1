<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Botão de Tema Agrinho</title>
    <style>
        /* 1. AS VARIÁVEIS (Onde a mágica acontece) */
        :root {
            --cor-fundo: #ffffff;
            --cor-texto: #1a1a1a;
            --cor-botao: #2e7d32;
        }

        /* 2. QUANDO O MODO ESCURO ESTÁ ATIVO */
        body.dark-mode {
            --cor-fundo: #121212;
            --cor-texto: #ffffff;
            --cor-botao: #4caf50;
        }

        /* 3. APLICAÇÃO NO DESIGN */
        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            transition: 0.4s; /* Deixa a troca suave */
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 4. ESTILO DO BOTÃO */
        .btn-flutuante {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background-color: var(--cor-botao);
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .btn-flutuante:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <h1>Teste de Componente</h1>
    <p>Se o fundo ficar preto, funcionou!</p>

    <button class="btn-flutuante" onclick="trocarTema()">🌓</button>

    <script>
        // 5. LÓGICA INFALÍVEL
        function trocarTema() {
            // Adiciona ou remove a classe 'dark-mode' do body
            document.body.classList.toggle('dark-mode');

            // Salva no navegador para não resetar quando atualizar
            const estaNoModoEscuro = document.body.classList.contains('dark-mode');
            localStorage.setItem('tema', estaNoModoEscuro ? 'escuro' : 'claro');
        }

        // 6. AO CARREGAR A PÁGINA: Verifica se o usuário já tinha escolhido
        window.onload = function() {
            if (localStorage.getItem('tema') === 'escuro') {
                document.body.classList.add('dark-mode');
            }
        };
    </script>
</body>
</html>
