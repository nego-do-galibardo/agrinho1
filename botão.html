<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Componente Dark Mode | Projeto Agrinho</title>
    <style>
        /* ALINHAMENTO ENTRE OBJETIVO E AÇÃO: Variáveis CSS */
        :root {
            --bg-principal: #f4f9f4;
            --texto-principal: #333333;
            --cor-acento: #2e7d32;
        }

        body.dark-mode {
            --bg-principal: #121212;
            --texto-principal: #f4f4f4;
            --cor-acento: #4caf50;
        }

        /* Estilo do Componente (Fácil percepção) */
        .btn-theme-switcher {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: var(--cor-acento);
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            z-index: 9999;
        }

        .btn-theme-switcher:hover {
            transform: scale(1.1);
        }

        /* Demonstração de Alinhamento com o Layout Agrinho */
        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            font-family: 'Segoe UI', sans-serif;
            transition: background 0.3s ease;
            margin: 0;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div style="max-width: 600px; margin: auto; text-align: center;">
        <h1>Módulo de Acessibilidade Visual</h1>
        <p>Este componente cumpre o objetivo de inovação do Projeto Agrinho.</p>
    </div>

    <button class="btn-theme-switcher" onclick="executarTrocaTema()">🌓</button>

    <script>
        /**
         * FUNÇÃO: executarTrocaTema
         * AÇÃO: Alterna a classe de estilo e salva a preferência.
         */
        function executarTrocaTema() {
            const corpo = document.body;
            corpo.classList.toggle('dark-mode');
            
            // Persistência (Objetivo cumprido em sua totalidade)
            const isDark = corpo.classList.contains('dark-mode');
            localStorage.setItem('agrinho-theme', isDark ? 'dark' : 'light');
        }

        // Recuperação de estado (Fluxo de inicialização)
        (function carregarTema() {
            if (localStorage.getItem('agrinho-theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }
        })();
    </script>
</body>
</html>
