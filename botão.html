<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componente Botão de Tema - Agrinho</title>
    <style>
        /* --- CSS DO COMPONENTE --- */
        :root {
            --bg-body: #f4f9f4;
            --texto: #333333;
            --primaria: #2e7d32;
        }

        /* Variáveis quando o modo escuro está ativo */
        body.dark-mode {
            --bg-body: #121212;
            --texto: #f4f4f4;
        }

        body {
            background-color: var(--bg-body);
            color: var(--texto);
            font-family: sans-serif;
            transition: background 0.3s, color 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Estilo do Botão */
        .theme-toggle-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background-color: var(--primaria);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle-btn:hover {
            transform: scale(1.1);
        }

        .instrucoes {
            text-align: center;
            border: 2px dashed var(--primaria);
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="instrucoes">
        <h2>Componente: Dark Mode Switcher</h2>
        <p>Clique no botão flutuante no canto inferior para testar.</p>
    </div>

    <button class="theme-toggle-btn" id="btn-tema" title="Alternar Tema">🌓</button>

    <script>
        /* --- LÓGICA DO COMPONENTE --- */
        const btn = document.getElementById('btn-tema');
        const body = document.body;

        // Ao carregar, verifica se o usuário já prefere o modo escuro
        if (localStorage.getItem('tema-salvo') === 'dark') {
            body.classList.add('dark-mode');
        }

        btn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            
            // Salva a preferência
            const modoAtual = body.classList.contains('dark-mode') ? 'dark' : 'light';
            localStorage.setItem('tema-salvo', modoAtual);
        });
    </script>
</body>
</html>
